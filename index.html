<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard Flotta 2025</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.card{
background:#111827;
border:1px solid #374151;
}

.kpi-value{
font-size:1.7rem;
font-weight:700;
}

.kpi-sub{
font-size:0.9rem;
color:#9ca3af;
}

.chart-box{
background:#111827;
padding:20px;
border-radius:12px;
}

</style>
</head>

<body>

<div class="container mt-4">

<h3 class="mb-4">Dashboard Flotta 2025</h3>

<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="card p-3">

<div>🚗 Flotta media</div>

<div id="fleetSize" class="kpi-value">–</div>

</div>
</div>


<div class="col-md-3">
<div class="card p-3">

<div>💶 Canone imponibile</div>

<div id="canoneTot" class="kpi-value">–</div>

<div class="kpi-sub">ivato: <span id="canoneIvato">–</span></div>

<div class="kpi-sub">medio: <span id="canoneMedio">–</span></div>

</div>
</div>


<div class="col-md-3">
<div class="card p-3">

<div>🛡 Assicurazione</div>

<div id="assTot" class="kpi-value">–</div>

<div class="kpi-sub">media: <span id="assMedio">–</span></div>

</div>
</div>


<div class="col-md-3">
<div class="card p-3">

<div>💰 Costo totale</div>

<div id="costTot" class="kpi-value">–</div>

<div class="kpi-sub">medio: <span id="costMedio">–</span></div>

</div>
</div>

</div>


<div class="chart-box">

<canvas id="fleetChart"></canvas>

</div>

</div>

<script>

const MONTHS=[
"Gen","Feb","Mar","Apr","Mag","Giu",
"Lug","Ago","Set","Ott","Nov","Dic"
]

let fleet=[]

async function load(){

const res=await fetch("fleetData_dashboard.json")

fleet=await res.json()

compute()

}

function parseDate(d){

if(!d)return null

return new Date(d)

}

function compute(){

const monthly=[]

for(let m=0;m<12;m++){

monthly.push({
month:m+1,
fleet:0,
canone:0,
ivato:0,
ass:0
})

}

fleet.forEach(v=>{

const start=parseDate(v["Date In"])
const end=parseDate(v["Date Out"])

if(!start||!end)return

for(let m=1;m<=12;m++){

const date=new Date(2025,m-1,1)

if(date>=start && date<=end){

monthly[m-1].fleet+=1

monthly[m-1].canone+=Number(v["Canone imponibile"]||0)

monthly[m-1].ivato+=Number(v["Canone ivato"]||0)

monthly[m-1].ass+=Number(v["Canone assicurazione"]||0)

}

}

})

const totals={

fleet:0,
canone:0,
ivato:0,
ass:0

}

monthly.forEach(m=>{

totals.fleet+=m.fleet
totals.canone+=m.canone
totals.ivato+=m.ivato
totals.ass+=m.ass

})

const fleetAvg=totals.fleet/12

const costTot=totals.canone+totals.ass

document.getElementById("fleetSize").innerText=
fleetAvg.toFixed(1)

document.getElementById("canoneTot").innerText=
"€ "+totals.canone.toLocaleString("it")

document.getElementById("canoneIvato").innerText=
"€ "+totals.ivato.toLocaleString("it")

document.getElementById("canoneMedio").innerText=
"€ "+(totals.canone/fleetAvg).toFixed(0)

document.getElementById("assTot").innerText=
"€ "+totals.ass.toLocaleString("it")

document.getElementById("assMedio").innerText=
"€ "+(totals.ass/fleetAvg).toFixed(0)

document.getElementById("costTot").innerText=
"€ "+costTot.toLocaleString("it")

document.getElementById("costMedio").innerText=
"€ "+(costTot/fleetAvg).toFixed(0)


renderChart(monthly)

}

function renderChart(data){

const ctx=document.getElementById("fleetChart")

new Chart(ctx,{

type:"line",

data:{

labels:MONTHS,

datasets:[

{
label:"Flotta",
data:data.map(d=>d.fleet),
borderColor:"#3b82f6"
},

{
label:"Costo totale",
data:data.map(d=>d.canone+d.ass),
borderColor:"#ef4444"
}

]

}

})

}

load()

</script>

</body>
</html>
