<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<title>Dashboard Flotta</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#020617;
color:white;
font-family:system-ui;
}
.sidebar{
background:#020617;
border:1px solid #374151;
padding:15px;
border-radius:10px;
}
.kpi-card{
background:#111827;
border-radius:10px;
padding:15px;
}
</style>

</head>

<body>

<div class="container-fluid p-4">
<div class="row">

<!-- FILTRI -->
<div class="col-lg-3">
<div class="sidebar">

<label>Mese</label>
<select id="monthFilter" class="form-select mb-2" multiple>
<option value="ALL" selected>Tutti</option>
</select>

<label>Gruppo</label>
<select id="groupFilter" class="form-select mb-2" multiple>
<option value="ALL" selected>Tutti</option>
</select>

<label>Provider</label>
<select id="acquisitionFilter" class="form-select mb-2" multiple>
<option value="ALL" selected>Tutti</option>
</select>

</div>
</div>

<!-- KPI -->
<div class="col-lg-9">

<div class="row mb-3">

<div class="col-md-3">
<div class="kpi-card">
Flotta
<div id="fleet"></div>
</div>
</div>

<div class="col-md-3">
<div class="kpi-card">
Canone
<div id="canone"></div>
</div>
</div>

<div class="col-md-3">
<div class="kpi-card">
Assicurazione
<div id="ass"></div>
</div>
</div>

<div class="col-md-3">
<div class="kpi-card">
Totale
<div id="tot"></div>
</div>
</div>

</div>

<canvas id="chart"></canvas>

</div>

</div>
</div>

<script>

const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"]

let data = []
let monthly = []

async function init(){

let res = await fetch("fleetData_dashboard.json")
let text = await res.text()
text = text.replace(/NaN/g,"null")
data = JSON.parse(text)

initFilters()
compute()

}

function initFilters(){

  const monthSel = document.getElementById("monthFilter")
  const groupSel = document.getElementById("groupFilter")
  const acquisitionSel = document.getElementById("acquisitionFilter")

  // 🔴 BLOCCO ANTI ERRORE DEFINITIVO
  if(!monthSel || !groupSel || !acquisitionSel){
    console.error("ERRORE DOM: uno dei filtri non esiste")
    return
  }

  // mesi
  MONTHS.forEach((m,i)=>{
    const o=document.createElement("option")
    o.value=i+1
    o.textContent=m
    monthSel.appendChild(o)
  })

  // gruppi
  let groups = new Set()
  let providers = new Set()

  data.forEach(d=>{
    if(d.category) groups.add(d.category)
    if(d.provider) providers.add(d.provider)
  })

  groups.forEach(g=>{
    const o=document.createElement("option")
    o.value=g
    o.textContent=g
    groupSel.appendChild(o)
  })

  providers.forEach(p=>{
    const o=document.createElement("option")
    o.value=p
    o.textContent=p
    acquisitionSel.appendChild(o)
  })

  // eventi
  ["monthFilter","groupFilter","acquisitionFilter"]
  .forEach(id=>{
    const el = document.getElementById(id)
    if(el) el.addEventListener("change",compute)
  })
}

function getSel(id){
let v=[...document.getElementById(id).selectedOptions].map(o=>o.value)
return v.includes("ALL")?[]:v
}

function compute(){

let monthsSel = getSel("monthFilter")
let groupsSel = getSel("groupFilter")
let provSel = getSel("acquisitionFilter")

monthly = Array.from({length:12},()=>({fleet:0,canone:0,ass:0}))

data.forEach(v=>{

let start = new Date(v["Date In"])
let end = v["Date Out"] ? new Date(v["Date Out"]) : new Date(2025,11,31)

let canone = Number(v["Canone imponibile"]||0)
let ass = Number(v["Canone assicurazione"]||0)

for(let m=1;m<=12;m++){

let mStart = new Date(2025,m-1,1)
let mEnd = new Date(2025,m,0)

let s = new Date(Math.max(start,mStart))
let e = new Date(Math.min(end,mEnd))

if(e < s) continue

let days = Math.floor((e-s)/(1000*60*60*24))+1

if(monthsSel.length && !monthsSel.includes(String(m))) continue
if(groupsSel.length && !groupsSel.includes(v.category)) continue
if(provSel.length && !provSel.includes(v.provider)) continue

// COSTI SEMPRE
monthly[m-1].canone += canone
monthly[m-1].ass += ass

// FLOTTA SOLO >=20 giorni
if(days >= 20){
monthly[m-1].fleet++
}

}

})

update()

}

function update(){

let monthsSel = getSel("monthFilter")

let fleet=0,canone=0,ass=0,count=0

monthly.forEach((m,i)=>{

if(monthsSel.length && !monthsSel.includes(String(i+1))) return

fleet+=m.fleet
canone+=m.canone
ass+=m.ass
count++

})

if(count===0) count=12

document.getElementById("fleet").innerText = (fleet/count).toFixed(1)
document.getElementById("canone").innerText = "€ "+canone.toLocaleString("it")
document.getElementById("ass").innerText = "€ "+ass.toLocaleString("it")
document.getElementById("tot").innerText = "€ "+(canone+ass).toLocaleString("it")

}

init()

</script>

</body>
</html>
