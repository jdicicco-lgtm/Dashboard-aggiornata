<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<title>Dashboard Flotta</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#020617;
color:white;
font-family:system-ui;
}
.sidebar{
background:#020617;
border:1px solid #374151;
padding:15px;
border-radius:10px;
}
.kpi-card{
background:#111827;
border-radius:10px;
padding:15px;
}
</style>

</head>

<body>

<div class="container-fluid p-4">
<div class="row">

<div class="col-lg-3">
<div class="sidebar">

<label>Mese</label>
<select id="monthFilter" class="form-select mb-2" multiple>
<option value="ALL" selected>Tutti</option>
</select>

<label>Gruppo</label>
<select id="groupFilter" class="form-select mb-2" multiple>
<option value="ALL" selected>Tutti</option>
</select>

<label>Provider</label>
<select id="acquisitionFilter" class="form-select mb-2" multiple>
<option value="ALL" selected>Tutti</option>
</select>

</div>
</div>

<div class="col-lg-9">

<div class="row mb-3">

<div class="col-md-3"><div class="kpi-card">Flotta<div id="kpiFleet"></div></div></div>
<div class="col-md-3"><div class="kpi-card">Canone<div id="kpiCanone"></div></div></div>
<div class="col-md-3"><div class="kpi-card">Assicurazione<div id="kpiAss"></div></div></div>
<div class="col-md-3"><div class="kpi-card">Totale<div id="kpiTot"></div></div></div>

</div>

<canvas id="chart"></canvas>

</div>
</div>
</div>

<script>

const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"]

const GROUP_LIST = [
"Economy","Mini","Small","Large","Suv",
"Commercial Van","People Mover",
"Premium","Station Wagon","Cabriolet"
]

let fleetData = []
let monthly = []
let chart = null

document.addEventListener("DOMContentLoaded", init)

async function init(){

  const res = await fetch("fleetData_dashboard.json")
  let text = await res.text()
  text = text.replace(/NaN/g,"null")
  fleetData = JSON.parse(text)

  initFilters()
  compute()
}

// ================= NORMALIZE =================

function normalizeGroup(raw){

  if(!raw) return null

  const s = raw.toLowerCase()

  if(s.includes("economy")) return "Economy"
  if(s.includes("mini")) return "Mini"
  if(s.includes("small") || s.includes("group b")) return "Small"
  if(s.includes("large") || s.includes("group d")) return "Large"
  if(s.includes("suv")) return "Suv"
  if(s.includes("premium") || s.includes("group p")) return "Premium"
  if(s.includes("station")) return "Station Wagon"
  if(s.includes("cabrio") || s.includes("group x")) return "Cabriolet"

  if(s.includes("furgon") || s.includes("commercial"))
    return "Commercial Van"

  if(s.includes("van"))
    return "People Mover"

  return null
}

// ================= FILTERS =================

function initFilters(){

  const monthSel = document.getElementById("monthFilter")
  const groupSel = document.getElementById("groupFilter")
  const acquisitionSel = document.getElementById("acquisitionFilter")

  // reset
  monthSel.innerHTML = '<option value="ALL" selected>Tutti</option>'
  groupSel.innerHTML = '<option value="ALL" selected>Tutti</option>'
  acquisitionSel.innerHTML = '<option value="ALL" selected>Tutti</option>'

  // mesi
  MONTHS.forEach((m,i)=>{
    const o=document.createElement("option")
    o.value=i+1
    o.textContent=m
    monthSel.appendChild(o)
  })

  // gruppi NORMALIZZATI
  let groups = new Set()

  fleetData.forEach(d=>{
    const g = normalizeGroup(d.category)
    if(g) groups.add(g)
  })

  // ordine pulito
  GROUP_LIST.forEach(g=>{
    if(groups.has(g)){
      const o=document.createElement("option")
      o.value=g
      o.textContent=g
      groupSel.appendChild(o)
    }
  })

  // provider
  let providers = new Set()
  fleetData.forEach(d=>{
    if(d.provider) providers.add(d.provider)
  })

  providers.forEach(p=>{
    const o=document.createElement("option")
    o.value=p
    o.textContent=p
    acquisitionSel.appendChild(o)
  })

  // eventi
  monthSel.onchange = compute
  groupSel.onchange = compute
  acquisitionSel.onchange = compute
}

// ================= UTILS =================

function getSelected(id){
  const el = document.getElementById(id)
  if(!el) return []
  const vals=[...el.selectedOptions].map(o=>o.value)
  return vals.includes("ALL")?[]:vals
}

// ================= CORE =================

function compute(){

  const monthsSel = getSelected("monthFilter")
  const groupsSel = getSelected("groupFilter")
  const provSel = getSelected("acquisitionFilter")

  monthly = Array.from({length:12},()=>({fleet:0,canone:0,ass:0}))

  fleetData.forEach(v=>{

    const gruppo = normalizeGroup(v.category)
    if(!gruppo) return

    const start = new Date(v["Date In"])
    const end = v["Date Out"] ? new Date(v["Date Out"]) : new Date(2025,11,31)

    const canone = Number(String(v["Canone imponibile"]||0).replace(",", "."))
    const ass = Number(String(v["Canone assicurazione"]||0).replace(",", "."))

    for(let m=1;m<=12;m++){

      const mStart = new Date(2025,m-1,1)
      const mEnd = new Date(2025,m,0)

      const overlapStart = new Date(Math.max(start,mStart))
      const overlapEnd = new Date(Math.min(end,mEnd))

      if(overlapEnd < overlapStart) continue

      const days = Math.floor((overlapEnd-overlapStart)/(1000*60*60*24))+1

      if(monthsSel.length && !monthsSel.includes(String(m))) continue
      if(groupsSel.length && !groupsSel.includes(gruppo)) continue
      if(provSel.length && !provSel.includes(v.provider)) continue

      // COSTI
      monthly[m-1].canone += canone
      monthly[m-1].ass += ass

      // FLOTTA
      if(days >= 20){
        monthly[m-1].fleet++
      }
    }
  })

  update()
  drawChart()
}

// ================= KPI =================

function update(){

  const monthsSel = getSelected("monthFilter")

  let fleet=0,canone=0,ass=0,count=0

  monthly.forEach((m,i)=>{

    if(monthsSel.length && !monthsSel.includes(String(i+1))) return

    fleet+=m.fleet
    canone+=m.canone
    ass+=m.ass
    count++
  })

  if(count===0) count=12

  document.getElementById("kpiFleet").innerText = (fleet/count).toFixed(1)
  document.getElementById("kpiCanone").innerText = "€ "+canone.toLocaleString("it")
  document.getElementById("kpiAss").innerText = "€ "+ass.toLocaleString("it")
  document.getElementById("kpiTot").innerText = "€ "+(canone+ass).toLocaleString("it")
}

// ================= CHART =================

function drawChart(){

  if(chart) chart.destroy()

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:MONTHS,
      datasets:[
        {label:"Flotta",data:monthly.map(m=>m.fleet),borderColor:"#3b82f6"},
        {label:"Costo",data:monthly.map(m=>m.canone+m.ass),borderColor:"#ef4444"}
      ]
    }
  })
}

</script>
