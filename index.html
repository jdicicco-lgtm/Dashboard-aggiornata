<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<title>Dashboard Flotta</title>

<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg-main:#0f1115;
--bg-card:#181b22;
--border:#262a33;
--text:#f5f5f7;
--muted:#9ca3af;
--accent:#3b82f6;
}

body{
background: radial-gradient(circle at top,#1e293b 0,#020617 55%);
color:var(--text);
font-family:system-ui;
}

.sidebar{
background:#020617;
border:1px solid rgba(148,163,184,.3);
padding:1rem;
border-radius:1rem;
}

.kpi-card{
background: radial-gradient(circle at top left,#1f2937 0,#020617 55%);
border:1px solid rgba(148,163,184,.3);
border-radius:1rem;
padding:1rem;
}

.kpi-title{
font-size:.8rem;
text-transform:uppercase;
color:var(--muted);
}

.kpi-value{
font-size:1.5rem;
font-weight:700;
}

.kpi-sub{
font-size:.8rem;
color:var(--muted);
}

.chart-container{
background:#111827;
border-radius:1rem;
padding:1.5rem;
}

</style>

</head>


<body>

<div class="container-fluid p-4">

<div class="row g-3">

<!-- SIDEBAR -->
<div class="col-lg-3">

<div class="sidebar">

<h6 class="mb-3">Filtri</h6>

<label>Anno</label>
<select id="yearFilter" class="form-select form-select-sm mb-3" multiple>
<option value="ALL" selected>Tutti</option>
<option value="2025">2025</option>
</select>

<label>Mese</label>
<select id="monthFilter" class="form-select form-select-sm mb-3" multiple>
<option value="ALL" selected>Tutti</option>
</select>

<label>Gruppo veicolo</label>
<select id="groupFilter" class="form-select form-select-sm mb-3" multiple>
<option value="ALL" selected>Tutti</option>
</select>

<label>Acquisizione</label>
<select id="acquisitionFilter" class="form-select form-select-sm mb-3" multiple>
<option value="ALL" selected>Tutti</option>
</select>

</div>

</div>


<!-- MAIN -->
<div class="col-lg-9">

<div class="row g-3 mb-3">

<div class="col-md-3">
<div class="kpi-card">
<div class="kpi-title">🚗 Flotta media</div>
<div id="kpiFleet" class="kpi-value">–</div>
</div>
</div>

<div class="col-md-3">
<div class="kpi-card">
<div class="kpi-title">💶 Canone imponibile</div>
<div id="kpiCanone" class="kpi-value">–</div>
<div class="kpi-sub">ivato: <span id="kpiIvato">–</span></div>
<div class="kpi-sub">medio: <span id="kpiCanoneMedio">–</span></div>
</div>
</div>

<div class="col-md-3">
<div class="kpi-card">
<div class="kpi-title">🛡 Assicurazione</div>
<div id="kpiAss" class="kpi-value">–</div>
<div class="kpi-sub">media: <span id="kpiAssMedio">–</span></div>
</div>
</div>

<div class="col-md-3">
<div class="kpi-card">
<div class="kpi-title">💰 Costo totale</div>
<div id="kpiCosto" class="kpi-value">–</div>
<div class="kpi-sub">medio: <span id="kpiCostoMedio">–</span></div>
</div>
</div>

</div>


<div class="chart-container">
<canvas id="fleetChart"></canvas>
</div>

</div>

</div>

</div>


<script>

// =========================
// CONFIG
// =========================

const VEHICLE_GROUPS = [
"Commercial Van",
"Large",
"Economy",
"Small",
"Mini",
"Premium",
"Suv",
"People Mover",
"Station Wagon",
"Cabriolet"
]

const MONTH_LABELS = [
"Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
"Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"
]

let fleetData = []
let monthly = []
let chart = null


// =========================
// NORMALIZZAZIONE GRUPPI
// =========================

function normalizeGroup(raw){

  if(!raw) return null

  const s = String(raw).toLowerCase()

  if(s.includes("economy")) return "Economy"
  if(s.includes("mini")) return "Mini"
  if(s.includes("small") || s.includes("group b")) return "Small"
  if(s.includes("large") || s.includes("group d")) return "Large"
  if(s.includes("suv")) return "Suv"
  if(s.includes("premium")) return "Premium"
  if(s.includes("station")) return "Station Wagon"
  if(s.includes("cabrio") || s.includes("group x")) return "Cabriolet"

  if(s.includes("furgon") || s.includes("commercial"))
    return "Commercial Van"

  if(s.includes("people") || s.includes("van"))
    return "People Mover"

  return null
}


// =========================
// INIT
// =========================

document.addEventListener("DOMContentLoaded", init)

async function init(){

  await loadData()

  initMonths()
  initGroups()
  initAcquisition()
  initEvents()

  applyFilters()
}


// =========================
// LOAD JSON
// =========================

async function loadData(){

  const res = await fetch("fleetData_dashboard.json")

  let text = await res.text()

  text = text.replace(/NaN/g,"null")

  fleetData = JSON.parse(text)
}


// =========================
// FILTER INIT
// =========================

function initMonths(){

  const sel = document.getElementById("monthFilter")

  MONTH_LABELS.forEach((m,i)=>{

    const opt=document.createElement("option")
    opt.value=i+1
    opt.textContent=m

    sel.appendChild(opt)
  })
}

function initGroups(){

  const sel=document.getElementById("groupFilter")

  VEHICLE_GROUPS.forEach(g=>{
    const opt=document.createElement("option")
    opt.value=g
    opt.textContent=g
    sel.appendChild(opt)
  })
}

function initAcquisition(){

  const sel=document.getElementById("acquisitionFilter")

  const set=new Set()

  fleetData.forEach(r=>{
    if(r.provider) set.add(r.provider)
  })

  set.forEach(a=>{
    const opt=document.createElement("option")
    opt.value=a
    opt.textContent=a
    sel.appendChild(opt)
  })
}

function initEvents(){

  ["monthFilter","groupFilter","acquisitionFilter"]

  .forEach(id=>{
    document.getElementById(id)
    .addEventListener("change",applyFilters)
  })
}


// =========================
// UTILS
// =========================

function getSelected(id){

  const sel=document.getElementById(id)
  const vals=[...sel.selectedOptions].map(o=>o.value)

  if(vals.includes("ALL")) return []

  return vals.map(v=>isNaN(v)?v:Number(v))
}


// =========================
// CORE LOGIC
// =========================

function applyFilters(){

  const months = getSelected("monthFilter")
  const groups = getSelected("groupFilter")
  const acquisitions = getSelected("acquisitionFilter")

  // init mesi
  monthly = []

  for(let m=1;m<=12;m++){
    monthly.push({
      month:m,
      fleet:0,
      canone:0,
      ivato:0,
      ass:0
    })
  }

  fleetData.forEach(v=>{

    const gruppo = normalizeGroup(v.category)
    if(!gruppo) return

    const start = new Date(v["Date In"])
    const end = new Date(v["Date Out"])

    if(!start || !end) return

for(let m=1;m<=12;m++){

  const monthStart = new Date(2025, m-1, 1)
  const monthEnd = new Date(2025, m, 0)

  // overlap giorni reali
  const overlapStart = new Date(Math.max(start, monthStart))
  const overlapEnd = new Date(Math.min(end, monthEnd))

  // se non c'è overlap salta
  if(overlapEnd < overlapStart) continue

  const overlapDays =
    Math.floor((overlapEnd - overlapStart) / (1000*60*60*24)) + 1

// filtri
if(months.length && !months.includes(m)) continue
if(groups.length && !groups.includes(gruppo)) continue
if(acquisitions.length && !acquisitions.includes(v.provider)) continue

const canone =
Number(String(v["Canone imponibile"]||0).replace(",", "."))

const ivato =
Number(String(v["Canone ivato"]||0).replace(",", "."))

const ass =
Number(String(v["Canone assicurazione"]||0).replace(",", "."))

// COSTI → sempre se il veicolo è presente nel mese
monthly[m-1].canone += canone
monthly[m-1].ivato += ivato
monthly[m-1].ass += ass

// FLOTTA → solo se almeno 20 giorni
if(overlapDays >= 20){
  monthly[m-1].fleet++
}

})
  updateKPI()
  renderChart()
}


// =========================
// KPI
// =========================

function updateKPI(){

  const monthsSelected = getSelected("monthFilter")

  let fleet=0, canone=0, ivato=0, ass=0
  let monthsCount = 0

  monthly.forEach(m=>{

    // se filtro mesi attivo → considera solo quelli
    if(monthsSelected.length && !monthsSelected.includes(m.month)) return

    fleet += m.fleet
    canone += m.canone
    ivato += m.ivato
    ass += m.ass

    monthsCount++
  })

  // fallback sicurezza
  if(monthsCount === 0) monthsCount = 12

  const fleetAvg = fleet / monthsCount
  const costTot = canone + ass

  document.getElementById("kpiFleet").innerText = fleetAvg.toFixed(1)

  document.getElementById("kpiCanone").innerText = "€ "+canone.toLocaleString("it")
  document.getElementById("kpiIvato").innerText = "€ "+ivato.toLocaleString("it")
  document.getElementById("kpiCanoneMedio").innerText = "€ "+(canone/fleetAvg).toFixed(0)

  document.getElementById("kpiAss").innerText = "€ "+ass.toLocaleString("it")
  document.getElementById("kpiAssMedio").innerText = "€ "+(ass/fleetAvg).toFixed(0)

  document.getElementById("kpiCosto").innerText = "€ "+costTot.toLocaleString("it")
  document.getElementById("kpiCostoMedio").innerText = "€ "+(costTot/fleetAvg).toFixed(0)
}

// =========================
// CHART
// =========================

function renderChart(){

  if(chart) chart.destroy()

  const ctx=document.getElementById("fleetChart")

  chart=new Chart(ctx,{

    type:"line",

    data:{
      labels:MONTH_LABELS,
      datasets:[
        {
          label:"Flotta",
          data:monthly.map(m=>m.fleet),
          borderColor:"#3b82f6",
          tension:.3
        },
        {
          label:"Costo totale",
          data:monthly.map(m=>m.canone+m.ass),
          borderColor:"#ef4444",
          tension:.3
        }
      ]
    }

  })
}

</script>

</body>
</html>
