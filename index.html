<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Dashboard Flotta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.card{
background:#111827;
border:1px solid #374151;
}

.kpi-value{
font-size:1.6rem;
font-weight:700;
}

.kpi-sub{
font-size:0.85rem;
color:#9ca3af;
}

.sidebar{
background:#020617;
border:1px solid #374151;
padding:15px;
border-radius:10px;
}

.chart-container{
background:#111827;
padding:20px;
border-radius:10px;
}

</style>

</head>


<body>

<div class="container-fluid p-4">

<div class="row">

<div class="col-lg-3">

<div class="sidebar">

<h6 class="mb-3">Filtri</h6>


<label class="form-label">Anno</label>

<select id="yearFilter" class="form-select form-select-sm mb-3" multiple>

<option value="ALL" selected>Tutti</option>
<option value="2025">2025</option>

</select>


<label class="form-label">Mese</label>

<select id="monthFilter" class="form-select form-select-sm mb-3" multiple>

<option value="ALL" selected>Tutti</option>

</select>


<label class="form-label">Gruppo veicolo</label>

<select id="groupFilter" class="form-select form-select-sm mb-3" multiple>

<option value="ALL" selected>Tutti</option>

</select>


<label class="form-label">Acquisizione</label>

<select id="acquisitionFilter" class="form-select form-select-sm mb-3" multiple>

<option value="ALL" selected>Tutti</option>

</select>

</div>

</div>


<div class="col-lg-9">

<div class="row g-3 mb-4">

<div class="col-md-3">

<div class="card p-3">

<div>🚗 Flotta media</div>

<div id="fleetSize" class="kpi-value">–</div>

</div>

</div>


<div class="col-md-3">

<div class="card p-3">

<div>💶 Canone imponibile</div>

<div id="canoneTot" class="kpi-value">–</div>

<div class="kpi-sub">ivato: <span id="canoneIvato">–</span></div>

<div class="kpi-sub">medio: <span id="canoneMedio">–</span></div>

</div>

</div>


<div class="col-md-3">

<div class="card p-3">

<div>🛡 Assicurazione</div>

<div id="assTot" class="kpi-value">–</div>

<div class="kpi-sub">media: <span id="assMedio">–</span></div>

</div>

</div>


<div class="col-md-3">

<div class="card p-3">

<div>💰 Costo totale</div>

<div id="costTot" class="kpi-value">–</div>

<div class="kpi-sub">medio: <span id="costMedio">–</span></div>

</div>

</div>

</div>


<div class="chart-container">

<canvas id="fleetChart"></canvas>

</div>

</div>

</div>

</div>


<script>


const VEHICLE_GROUPS = [
"Commercial Van",
"Large",
"Economy",
"Small",
"Mini",
"Premium",
"Suv",
"People Mover",
"Station Wagon",
"Cabriolet"
];


const MONTHS=[
"Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
"Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"
];


let fleetData=[]
let monthlyAggregates=[]
let chart=null


document.addEventListener("DOMContentLoaded",()=>{

initMonths()
initGroups()

loadData()

})


async function loadData(){

const res=await fetch("fleetData_dashboard.json")

let text=await res.text()

text=text.replace(/NaN/g,"null")

fleetData=JSON.parse(text)

initAcquisition()

applyFilters()

initEvents()

}


function initMonths(){

const sel=document.getElementById("monthFilter")

MONTHS.forEach((m,i)=>{

const opt=document.createElement("option")

opt.value=i+1

opt.textContent=m

sel.appendChild(opt)

})

}


function initGroups(){

const sel=document.getElementById("groupFilter")

VEHICLE_GROUPS.forEach(g=>{

const opt=document.createElement("option")

opt.value=g

opt.textContent=g

sel.appendChild(opt)

})

}


function initAcquisition(){

const sel=document.getElementById("acquisitionFilter")

const set=new Set()

fleetData.forEach(r=>{

if(r.provider)set.add(r.provider)

})

set.forEach(a=>{

const opt=document.createElement("option")

opt.value=a

opt.textContent=a

sel.appendChild(opt)

})

}


function initEvents(){

["monthFilter","groupFilter","acquisitionFilter"]

.forEach(id=>{

document.getElementById(id)

.addEventListener("change",applyFilters)

})

}


function applyFilters(){

const months=getSelected("monthFilter")

const groups=getSelected("groupFilter")

const acquisitions=getSelected("acquisitionFilter")


const buckets=[]

for(let m=1;m<=12;m++){

buckets.push({

month:m,
fleet:0,
canone:0,
ivato:0,
ass:0

})

}


fleetData.forEach(v=>{

const start=new Date(v["Date In"])
const end=new Date(v["Date Out"])

if(!start||!end)return

for(let m=1;m<=12;m++){

const date=new Date(2025,m-1,1)

if(date>=start && date<=end){

if(months.length && !months.includes(m))return

if(groups.length && !groups.includes(v["GRUPPO"]))return

if(acquisitions.length && !acquisitions.includes(v.provider))return


buckets[m-1].fleet++

buckets[m-1].canone+=Number(v["CANONE IMPONIBILE"]||0)

buckets[m-1].ivato+=Number(v["CANONE IVATO"]||0)

buckets[m-1].ass+=Number(v["COPERTURA ASS."]||0)

}

}

})


monthlyAggregates=buckets

updateKPI()

renderChart()

}


function getSelected(id){

const sel=document.getElementById(id)

const vals=[...sel.selectedOptions].map(o=>o.value)

if(vals.includes("ALL"))return[]

return vals.map(v=>isNaN(v)?v:Number(v))

}


function updateKPI(){

let fleet=0
let canone=0
let ivato=0
let ass=0


monthlyAggregates.forEach(m=>{

fleet+=m.fleet
canone+=m.canone
ivato+=m.ivato
ass+=m.ass

})

const fleetAvg=fleet/12
const costTot=canone+ass

document.getElementById("fleetSize").innerText=fleetAvg.toFixed(1)

document.getElementById("canoneTot").innerText="€ "+canone.toLocaleString("it")
document.getElementById("canoneIvato").innerText="€ "+ivato.toLocaleString("it")
document.getElementById("canoneMedio").innerText="€ "+(canone/fleetAvg).toFixed(0)

document.getElementById("assTot").innerText="€ "+ass.toLocaleString("it")
document.getElementById("assMedio").innerText="€ "+(ass/fleetAvg).toFixed(0)

document.getElementById("costTot").innerText="€ "+costTot.toLocaleString("it")
document.getElementById("costMedio").innerText="€ "+(costTot/fleetAvg).toFixed(0)

}


function renderChart(){

if(chart)chart.destroy()

const ctx=document.getElementById("fleetChart")

chart=new Chart(ctx,{

type:"line",

data:{

labels:MONTHS,

datasets:[

{
label:"Flotta",
data:monthlyAggregates.map(m=>m.fleet),
borderColor:"#3b82f6",
tension:0.3
},

{
label:"Costo totale",
data:monthlyAggregates.map(m=>m.canone+m.ass),
borderColor:"#ef4444",
tension:0.3
}

]

}

})

}

</script>

</body>
</html>
